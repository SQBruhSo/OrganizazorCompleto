<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Organizador Personal</title>
    <!-- Favicon -->
    <link class="fav-icon-tag" rel="icon" type="image/png" href="https://i.ibb.co/jP56fW2C/Red-Bold-Fashion-Studio-Logo.png">

    <!-- Conexión del Manifiesto PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <style>
        :root {
            --bg-color: #F4F5F6;
            --card-bg: #FFFFFF;
            --text-main: #111214;
            --text-muted: #626469;
            --accent-brand: #6B1D2F; 
            --accent-green: #2E7D32;
            --accent-yellow: #C67B00;
            --border-color: #E2E4E7;
            --aura-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
            --fade-bezier: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            animation: cardEntrance 0.5s var(--fade-bezier) backwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .btn-back {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s var(--fade-bezier);
        }
        .btn-back:hover { background: #EEEEEE; transform: translateY(-1px); }
        .btn-back:active { transform: translateY(1px); }

        .btn-today {
            background: transparent;
            color: var(--accent-brand);
            border: 1px solid var(--accent-brand);
            padding: 6px 14px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .btn-today:hover { background: rgba(107, 29, 47, 0.05); }

        .view {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.25s var(--fade-bezier), transform 0.25s var(--fade-bezier);
        }

        .view.hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.97);
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.4px;
        }
        .welcome-title span {
            color: var(--accent-brand);
            font-weight: 700;
            cursor: pointer;
            position: relative;
        }
        .welcome-title span::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 2px;
            background: var(--accent-brand);
            transform: scaleX(0);
            transition: transform 0.2s var(--fade-bezier);
        }
        .welcome-title span:hover::after { transform: scaleX(1); }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .menu-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 22px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
            border: 1px solid rgba(0, 0, 0, 0.01);
            transition: all 0.25s var(--aura-bezier);
            animation: cardEntrance 0.5s var(--fade-bezier) backwards;
        }
        .menu-item:nth-child(1) { animation-delay: 0.05s; }
        .menu-item:nth-child(2) { animation-delay: 0.1s; }
        .menu-item:nth-child(3) { animation-delay: 0.15s; }

        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            border-color: var(--border-color);
        }
        .menu-item:active { transform: scale(0.95); }

        .menu-item .icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s var(--aura-bezier);
        }
        .menu-item:hover .icon { transform: scale(1.1) rotate(4deg); }
        .menu-item span { font-size: 13px; font-weight: 600; color: var(--text-main); }

        .list-preview { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .list-preview li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            animation: itemFadeIn 0.3s var(--fade-bezier) both;
        }

        .time-badge {
            background: #F4F5F6;
            color: var(--accent-brand);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #EDEDED;
            gap: 12px;
            animation: itemFadeIn 0.35s var(--fade-bezier) both;
        }
        
        @keyframes itemFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-text { cursor: pointer; display: flex; align-items: center; gap: 12px; flex: 1; overflow: hidden; }
        .task-text span { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-text.completed span { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }
        .task-text input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent-brand); cursor: pointer; }

        .btn-delete {
            background: transparent; color: var(--text-muted); border: none; font-size: 18px; cursor: pointer;
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-delete:hover { background: #FCE8E6; color: #C5221F; }

        .task-input-container { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
        .input-row-bottom { display: flex; gap: 10px; }
        .input-group { display: flex; gap: 10px; margin-top: 18px; }

        .input-flat {
            flex: 1; background: #F4F5F6; border: 1px solid transparent; padding: 14px 16px; border-radius: 14px;
            font-size: 15px; color: var(--text-main); outline: none; transition: all 0.2s var(--fade-bezier);
        }
        .input-flat:focus { border-color: var(--accent-brand); background: #FFFFFF; box-shadow: 0 4px 12px rgba(107,29,47,0.04); }

        .btn-add {
            background: var(--text-main); color: white; border: none; padding: 0 22px; border-radius: 14px;
            font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s var(--fade-bezier);
        }
        .btn-add:hover { background: var(--accent-brand); transform: translateY(-1px); }
        .btn-add:active { transform: translateY(1px); }

        .format-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
            background: #F4F5F6;
            padding: 6px;
            border-radius: 14px;
        }
        .format-btn {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.15s ease;
        }
        .format-btn:hover { background: var(--accent-brand); color: #FFFFFF; border-color: var(--accent-brand); }

        .rich-editor {
            width: 100%;
            height: 220px;
            background: #F4F5F6;
            border: 1px solid transparent;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            overflow-y: auto;
            text-align: left;
            transition: all 0.2s;
        }
        .rich-editor:focus {
            border-color: var(--accent-brand);
            background: #FFFFFF;
            box-shadow: 0 4px 12px rgba(107,29,47,0.04);
        }
        
        .rich-editor h1 { font-size: 22px; font-weight: 700; margin: 8px 0 4px 0; color: var(--accent-brand); }
        .rich-editor h2 { font-size: 18px; font-weight: 600; margin: 6px 0 4px 0; color: var(--text-main); }
        .rich-editor p { font-size: 15px; font-weight: 400; margin-bottom: 4px; color: var(--text-main); display: block; }
        .rich-editor b, .rich-editor strong { font-weight: 700; }
        .rich-editor i, .rich-editor em { font-style: italic; }

        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .calendar-title-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .calendar-title { font-size: 17px; font-weight: 600; text-transform: capitalize; }
        .weekdays-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        
        .calendar-day {
            background: transparent; color: var(--text-main); aspect-ratio: 1; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500;
            cursor: pointer; border: 1px solid transparent; transition: all 0.2s var(--fade-bezier);
        }
        .calendar-day:hover:not(.empty) { background: #EEEEEE; }
        .calendar-day.empty { background: transparent; cursor: default; }
        .calendar-day.selected { border-color: var(--accent-brand) !important; color: var(--accent-brand) !important; font-weight: 700; transform: scale(1.05); }
        .calendar-day.current-today { background: var(--accent-brand) !important; color: white !important; font-weight: 700; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(17, 18, 20, 0.4); backdrop-filter: blur(4px); z-index: 99;
            animation: fadeInOverlay 0.2s ease forwards;
        }
        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -45%) scale(0.95); background: white;
            border-radius: 24px; padding: 24px; z-index: 100; width: 90%; max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); opacity: 0; transition: all 0.3s var(--aura-bezier);
        }
        .modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .note-item-btn { text-align: left; font-weight: 500; cursor: pointer; background: #FFFFFF; border: 1px solid var(--border-color); }
        .note-item-btn:hover { background: #F4F5F6; transform: translateX(2px); }

        .color-picker { display: flex; gap: 12px; margin: 14px 0; }
        .color-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-opt.active { border-color: var(--text-main); transform: scale(1.15); }

        #calendar-detail-box { border-top: 1px solid var(--border-color); padding-top: 16px; margin-top: 14px; animation: itemFadeIn 0.3s var(--fade-bezier); }
        .icon svg { width: 22px; height: 22px; fill: currentColor; }
        h3 { font-size: 17px; font-weight: 600; color: var(--text-main); }

        /* WIDGET APPLE DE NOTIFICACIONES */
        .pwa-widget {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(107,29,47,0.06) 0%, rgba(107,29,47,0.01) 100%);
            border: 1px dashed rgba(107, 29, 47, 0.2);
            padding: 16px 20px;
            border-radius: 20px;
        }
        .pwa-widget-text h4 { font-size: 14px; font-weight: 600; color: var(--accent-brand); margin-bottom: 2px; }
        .pwa-widget-text p { font-size: 12px; color: var(--text-muted); }
        .btn-pwa-toggle {
            background: var(--accent-brand); color: white; border: none; padding: 8px 16px; border-radius: 100px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s var(--fade-bezier);
        }
        .btn-pwa-toggle:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- HOME -->
        <div id="view-home" class="view">
            <div class="card brand-header">
                <div class="welcome-title">Estudio de <span id="username-display" onclick="openModal('username-modal')">Usuario</span></div>
            </div>

            <div class="grid-menu">
                <div class="menu-item" onclick="changeView('view-calendar')">
                    <div class="icon" style="background-color: var(--accent-brand);"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg></div>
                    <span>Sesiones</span>
                </div>
                <div class="menu-item" onclick="changeView('view-tasks')">
                    <div class="icon" style="background-color: var(--accent-green);"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></div>
                    <span>Proyectos</span>
                </div>
                <div class="menu-item" onclick="changeView('view-notes')">
                    <div class="icon" style="background-color: var(--accent-yellow);"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
                    <span>Bocetos</span>
                </div>
            </div>

            <!-- WIDGET NOTIFICACIONES SISTEMA -->
            <div class="pwa-widget">
                <div class="pwa-widget-text">
                    <h4>Alertas de Entorno</h4>
                    <p id="pwa-status-text">Permisos de sonido inactivos.</p>
                </div>
                <button class="btn-pwa-toggle" onclick="solicitarPermisoNotificaciones()">Vincular</button>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 16px;">Plan de hoy</h3>
                <ul id="home-tasks-list" class="list-preview"></ul>
            </div>
        </div>

        <!-- CALENDARIO -->
        <div id="view-calendar" class="view hidden">
            <div class="card header-box">
                <span>Sesiones del Mes</span>
                <button class="btn-back" onclick="changeView('view-home')">Cerrar</button>
            </div>
            <div class="card">
                <div class="calendar-controls">
                    <button class="btn-back" style="padding: 6px 12px;" onclick="changeMonth(-1)">◀</button>
                    <div class="calendar-title-container">
                        <div class="calendar-title" id="calendar-month-year"></div>
                        <button class="btn-today" onclick="goToCurrentMonth()">Hoy</button>
                    </div>
                    <button class="btn-back" style="padding: 6px 12px;" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="weekdays-grid"><div>D</div><div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div></div>
                <div class="calendar-grid" id="calendar-grid-box"></div>
                
                <div id="calendar-detail-box" style="display:none;">
                    <h3 id="cal-detail-title" style="color:var(--accent-brand); font-size:15px; margin-bottom: 4px;">Agenda de la fecha</h3>
                    <p id="cal-detail-text" style="margin-bottom: 14px; font-size:14px; color:var(--text-muted);"></p>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-back" id="btn-edit-cal" style="background:var(--accent-brand); color:white; border:none; flex: 1;">Asignar</button>
                        <button class="btn-back" id="btn-delete-cal" style="color:red; border-color:rgba(255,0,0,0.2);">Remover</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAREAS -->
        <div id="view-tasks" class="view hidden">
            <div class="card header-box">
                <span>Flujo de Proyectos</span>
                <button class="btn-back" onclick="changeView('view-home')">Cerrar</button>
            </div>
            <div class="card">
                <div id="tasks-container" style="display:flex; flex-direction:column;"></div>
                <div class="task-input-container">
                    <input type="text" id="task-input" class="input-flat" maxlength="50" placeholder="Nombre de la actividad...">
                    <div class="input-row-bottom">
                        <input type="text" id="task-time" class="input-flat" style="text-align:center;" maxlength="5" placeholder="Plazo (ej. 16:00)">
                        <button class="btn-add" style="flex: 1;" onclick="addTask()">Añadir</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- NOTAS -->
        <div id="view-notes" class="view hidden">
            <div class="card header-box">
                <span>Panel de Bocetos</span>
                <button class="btn-back" onclick="changeView('view-home')">Cerrar</button>
            </div>
            <div class="card">
                <div id="notes-container" style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;"></div>
                <div class="input-group">
                    <input type="text" id="note-title-input" class="input-flat" maxlength="30" placeholder="Nuevo título...">
                    <button class="btn-add" onclick="addNote()">Crear</button>
                </div>
            </div>
        </div>

    </div>

    <!-- OVERLAY -->
    <div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

    <!-- MODAL NOMBRE -->
    <div class="modal" id="username-modal">
        <h3 style="margin-bottom:14px;">Identidad del Estudio</h3>
        <input type="text" id="username-input" class="input-flat" style="width:100%; margin-bottom:18px;" maxlength="14">
        <button class="btn-add" style="width:100%; padding:14px;" onclick="saveUsername()">Actualizar</button>
    </div>

    <!-- MODAL BOCETOS -->
    <div class="modal" id="note-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <h3 id="modal-note-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%;"></h3>
            <button class="btn-back" style="color:red; padding:6px 12px; border-color: rgba(255,0,0,0.1);" id="btn-delete-note-trigger">Eliminar</button>
        </div>

        <div class="format-bar">
            <button class="format-btn" onclick="applyFormat('formatBlock', '<h1>')">Título</button>
            <button class="format-btn" onclick="applyFormat('formatBlock', '<h2>')">Subtítulo</button>
            <button class="format-btn" onclick="applyFormat('formatBlock', '<p>')">Texto</button>
            <button class="format-btn" onclick="applyFormat('bold')"><b>B</b></button>
            <button class="format-btn" onclick="applyFormat('italic')"><i>I</i></button>
        </div>

        <div id="modal-note-body" class="rich-editor" contenteditable="true"></div>
        <button class="btn-add" style="width:100%; padding:14px; margin-top:16px;" onclick="saveNoteBody()">Guardar Boceto</button>
    </div>

    <!-- MODAL CALENDARIO -->
    <div class="modal" id="calendar-modal">
        <h3 style="margin-bottom:14px;">Planificar: <span id="modal-day-num"></span></h3>
        <input type="text" id="cal-input-title" class="input-flat" style="width:100%; margin-bottom:18px;" placeholder="¿Qué hay agendado hoy?">
        <label style="font-size:12px; font-weight:600; color:var(--text-muted)">Paleta de Categoría:</label>
        <div class="color-picker">
            <div class="color-opt" style="background:var(--accent-brand);" data-color="#6B1D2F"></div>
            <div class="color-opt" style="background:var(--accent-green);" data-color="#2E7D32"></div>
            <div class="color-opt" style="background:var(--accent-yellow);" data-color="#C67B00"></div>
            <div class="color-opt" style="background:#1A73E8;" data-color="#1A73E8"></div>
        </div>
        <button class="btn-add" style="width:100%; padding:14px;" onclick="saveCalendarEvent()">Fijar en Agenda</button>
    </div>

    <script>
        let rawData = localStorage.getItem('aura_studio_data');
        let data = { username: 'Usuario', tasks: [], notes: {}, calendar: {} };
        
        if (rawData) {
            try {
                data = JSON.parse(rawData);
                if (data.username === 'Mamá') data.username = 'Usuario';
            } catch(e) { console.error(e); }
        }

        let currentCalendarDate = new Date();
        let selectedDayKey = null; 
        let activeNoteTitle = '';
        let selectedColor = '#6B1D2F';
        let tareasNotificadas = new Set(); // Evita duplicar alertas en el mismo minuto

        const monthNames = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];

        function saveData() {
            localStorage.setItem('aura_studio_data', JSON.stringify(data));
            renderEverything();
        }

        function applyFormat(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('modal-note-body').focus();
        }

        function changeView(viewId) {
            const currentActive = document.querySelector('.view:not(.hidden)');
            if(currentActive && currentActive.id !== viewId) {
                currentActive.style.opacity = '0';
                currentActive.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    currentActive.classList.add('hidden');
                    const nextView = document.getElementById(viewId);
                    nextView.classList.remove('hidden');
                    nextView.offsetHeight;
                    nextView.style.opacity = '1';
                    nextView.style.transform = 'scale(1)';
                }, 150);
            }
            document.getElementById('calendar-detail-box').style.display = 'none';
            selectedDayKey = null;
            renderEverything();
        }

        function openModal(id) {
            document.getElementById('overlay').style.display = 'block';
            const modal = document.getElementById(id);
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModals() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('active');
                setTimeout(() => m.style.display = 'none', 200);
            });
        }

        function saveUsername() {
            const name = document.getElementById('username-input').value.trim();
            if(name) data.username = name;
            saveData(); closeModals();
        }

        function addTask() {
            const text = document.getElementById('task-input').value.trim();
            let time = document.getElementById('task-time').value.trim();
            if(!text) return;
            
            // Forzar formato HH:MM limpio
            if(time && time.includes(':')) {
                let parts = time.split(':');
                let hrs = parts[0].padStart(2, '0');
                let mins = parts[1].padStart(2, '0');
                time = `${hrs}:${mins}`;
            }

            data.tasks.push({ text, time: time || null, completed: false });
            document.getElementById('task-input').value = '';
            document.getElementById('task-time').value = '';
            saveData();
        }

        function toggleTask(idx) { data.tasks[idx].completed = !data.tasks[idx].completed; saveData(); }
        function deleteTask(idx) { data.tasks.splice(idx, 1); saveData(); }

        function addNote() {
            const title = document.getElementById('note-title-input').value.trim();
            if(!title) return;
            if(!data.notes[title]) data.notes[title] = '<div>Escribe aquí tu contenido...</div>';
            document.getElementById('note-title-input').value = '';
            saveData();
            openNoteDetails(title);
        }

        function openNoteDetails(title) {
            activeNoteTitle = title;
            document.getElementById('modal-note-title').innerText = title;
            document.getElementById('modal-note-body').innerHTML = data.notes[title] || '<div></div>';
            document.getElementById('btn-delete-note-trigger').onclick = function() {
                delete data.notes[title]; saveData(); closeModals();
            };
            openModal('note-modal');
        }

        function saveNoteBody() {
            data.notes[activeNoteTitle] = document.getElementById('modal-note-body').innerHTML;
            saveData(); closeModals();
        }

        function changeMonth(direction) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + direction);
            document.getElementById('calendar-detail-box').style.display = 'none';
            selectedDayKey = null;
            renderCalendar();
        }

        function goToCurrentMonth() {
            currentCalendarDate = new Date();
            document.getElementById('calendar-detail-box').style.display = 'none';
            selectedDayKey = null;
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            const realToday = new Date();

            document.getElementById('calendar-month-year').innerText = `${monthNames[month]} ${year}`;
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const container = document.getElementById('calendar-grid-box');
            container.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'calendar-day empty';
                container.appendChild(emptyDiv);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayKey = `${year}-${month + 1}-${day}`;
                const btn = document.createElement('button');
                btn.className = 'calendar-day';
                btn.innerText = day;

                if (data.calendar[dayKey]) {
                    btn.style.background = `${data.calendar[dayKey].color}12`;
                    btn.style.color = data.calendar[dayKey].color;
                    btn.style.fontWeight = '600';
                    btn.style.borderBottom = `2px solid ${data.calendar[dayKey].color}`;
                }

                if (selectedDayKey === dayKey) btn.classList.add('selected');
                if (day === realToday.getDate() && month === realToday.getMonth() && year === realToday.getFullYear()) btn.classList.add('current-today');

                btn.onclick = () => selectDay(day, dayKey);
                container.appendChild(btn);
            }
        }

        function selectDay(day, dayKey) {
            selectedDayKey = dayKey;
            renderCalendar();

            const detailBox = document.getElementById('calendar-detail-box');
            const detailText = document.getElementById('cal-detail-text');

            if(data.calendar[dayKey]) {
                detailText.innerText = `Evento establecido: ${data.calendar[dayKey].title}`;
            } else {
                detailText.innerText = 'Libre de sesiones u obligaciones virtuales.';
            }
            detailBox.style.display = 'block';

            document.getElementById('btn-edit-cal').onclick = () => {
                const partes = dayKey.split('-');
                document.getElementById('modal-day-num').innerText = `${partes[2]}/${partes[1]}/${partes[0]}`;
                document.getElementById('cal-input-title').value = data.calendar[dayKey] ? data.calendar[dayKey].title : '';
                setModalColor(data.calendar[dayKey] ? data.calendar[dayKey].color : '#6B1D2F');
                openModal('calendar-modal');
            };

            document.getElementById('btn-delete-cal').onclick = () => {
                if(data.calendar[dayKey]) {
                    delete data.calendar[dayKey];
                    detailBox.style.display = 'none';
                    selectedDayKey = null;
                    saveData();
                }
            };
        }

        function setModalColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(opt => {
                if(opt.getAttribute('data-color') === color) opt.classList.add('active');
                else opt.classList.remove('active');
            });
        }

        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.onclick = function() { setModalColor(this.getAttribute('data-color')); }
        });

        function saveCalendarEvent() {
            const title = document.getElementById('cal-input-title').value.trim();
            if(title && selectedDayKey) {
                data.calendar[selectedDayKey] = { title: title, color: selectedColor };
                saveData();
                selectDay(null, selectedDayKey);
            }
            closeModals();
        }

        function renderEverything() {
            document.getElementById('username-display').innerText = data.username;
            document.getElementById('username-input').value = data.username;

            const homeList = document.getElementById('home-tasks-list');
            const tasksContainer = document.getElementById('tasks-container');
            homeList.innerHTML = '';
            tasksContainer.innerHTML = '';

            if(data.tasks.length === 0) {
                homeList.innerHTML = '<li style="color:var(--text-muted)">Nada planificado para este ciclo.</li>';
                tasksContainer.innerHTML = '<p style="color:var(--text-muted); padding:10px 0;">Bandeja limpia por el momento.</p>';
            }

            data.tasks.forEach((t, idx) => {
                const itemHome = document.createElement('li');
                itemHome.style.animationDelay = `${idx * 0.04}s`;
                const timeTag = t.time ? `<span class="time-badge">${t.time}</span>` : '';
                itemHome.innerHTML = `
                    <span style="${t.completed ? 'text-decoration:line-through; color:var(--text-muted); opacity: 0.6;' : ''}">${t.text}</span>
                    ${timeTag}
                `;
                homeList.appendChild(itemHome);

                const itemRow = document.createElement('div');
                itemRow.className = 'task-row';
                itemRow.style.animationDelay = `${idx * 0.03}s`;
                const timeText = t.time ? ` <small style="color:var(--accent-brand); font-weight:600;">(${t.time})</small>` : '';

                itemRow.innerHTML = `
                    <div class="task-text ${t.completed ? 'completed' : ''}" onclick="toggleTask(${idx})">
                        <input type="checkbox" ${t.completed ? 'checked' : ''}>
                        <span>${t.text}${timeText}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${idx})">×</button>
                `;
                tasksContainer.appendChild(itemRow);
            });

            const notesContainer = document.getElementById('notes-container');
            notesContainer.innerHTML = '';
            const keys = Object.keys(data.notes);
            if(keys.length === 0) notesContainer.innerHTML = '<p style="color:var(--text-muted)">No hay registros conceptuales aquí.</p>';
            
            keys.forEach((k, idx) => {
                const btnNota = document.createElement('button');
                btnNota.className = 'input-flat note-item-btn';
                btnNota.style.animationDelay = `${idx * 0.04}s`;
                btnNota.onclick = () => openNoteDetails(k);
                btnNota.innerText = `📝 ${k}`;
                notesContainer.appendChild(btnNota);
            });

            // Actualizar texto del Widget de Notificaciones según estado real
            const statusText = document.getElementById('pwa-status-text');
            if (Notification.permission === 'granted') {
                statusText.innerText = "Alertas activivas y vinculadas.";
            } else if (Notification.permission === 'denied') {
                statusText.innerText = "Bloqueadas desde el navegador.";
            }

            renderCalendar();
        }

        // ================= SISTEMA NATIVO PWA & ALERTAS DE RELOJ =================

        // Registro de Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }

        function solicitarPermisoNotificaciones() {
            if (!('Notification' in window)) {
                alert('Este navegador no soporta notificaciones de escritorio.');
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    enviarNotificacion("¡Entorno Enlazado!", "Recibirás pings acústicos y visuales al expirar plazos.");
                    renderEverything();
                }
            });
        }

        function enviarNotificacion(titulo, cuerpo) {
            if (Notification.permission === 'granted') {
                const opciones = {
                    body: cuerpo,
                    icon: 'https://i.ibb.co/jP56fW2C/Red-Bold-Fashion-Studio-Logo.png', // Tu logo aquí
                    vibrate: [200, 100, 200],
                    badge: 'https://i.ibb.co/jP56fW2C/Red-Bold-Fashion-Studio-Logo.png' // Y aquí
               };

                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification(titulo, opciones);
                    });
                } else {
                    new Notification(titulo, opciones);
                }

                // Generación de Audio Sintético sin archivos externos (Ping Estilo iOS)
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, audioContext.currentTime); 
                    
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.start();
                    osc.stop(audioContext.currentTime + 0.15);
                } catch(e) { console.log("Audio bloqueado temporalmente por interacción"); }
            }
        }

        // Reloj Checker de Tareas (Ejecución cada 30 segundos para precisión perfecta)
        setInterval(() => {
            const ahora = new Date();
            const hrs = String(ahora.getHours()).padStart(2, '0');
            const mins = String(ahora.getMinutes()).padStart(2, '0');
            const horaActualStr = `${hrs}:${mins}`;

            data.tasks.forEach(t => {
                if(t.time && !t.completed) {
                    // Forzar formato a comparar
                    let taskTimeClean = t.time.trim();
                    if(taskTimeClean === horaActualStr && !tareasNotificadas.has(t.text + horaActualStr)) {
                        enviarNotificacion("Plazo Expirado", `Es momento de procesar: ${t.text}`);
                        tareasNotificadas.add(t.text + horaActualStr);
                    }
                }
            });

            // Limpieza diaria de caché de alertas ejecutadas
            if(horaActualStr === "00:00") tareasNotificadas.clear();

        }, 30000);

        renderEverything();
    </script>
</body>
</html>
