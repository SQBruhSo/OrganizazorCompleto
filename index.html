<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Organizador Personal Pro</title>
    
    <link class="fav-icon-tag" rel="icon" type="image/png" href="https://i.ibb.co/pBwLqf1v/Dise-o-sin-t-tulo.png">
    <link class="apple-touch-icon" href="https://i.ibb.co/5h1j0fr3/Dise-o-sin-t-tulo.png">

    <script>
        (function() {
            const isMobile = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent) || window.innerWidth <= 768;
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = isMobile ? './manifest.json' : './manifest-pc.json';
            document.head.appendChild(manifestLink);

            let rawData = localStorage.getItem('aura_studio_data');
            if (rawData) {
                try {
                    let d = JSON.parse(rawData);
                    let theme = d.theme || 'light';
                    if (theme === 'system') {
                        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', theme);
                } catch(e){}
            }
        })();
    </script>
    
    <style>
        :root {
            --bg-color: #F4F5F6;
            --card-bg: #FFFFFF;
            --text-main: #111214;
            --text-muted: #626469;
            --accent-brand: #85243A; 
            --accent-green: #2E7D32;
            --accent-yellow: #C67B00;
            --border-color: #E2E4E7;
            --input-bg: #F4F5F6;
            --blur-bg: rgba(255, 255, 255, 0.85);
            --aura-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
            --fade-bezier: cubic-bezier(0.25, 1, 0.5, 1);
            --drawer-bezier: cubic-bezier(0.32, 0.94, 0.6, 1);
            --icon-filter: brightness(0) invert(0);
        }

        [data-theme="dark"] {
            --bg-color: #0B0C0E;
            --card-bg: #16181B;
            --text-main: #ECEEDF;
            --text-muted: #9AA0A6;
            --border-color: #2D3135;
            --input-bg: #212327;
            --blur-bg: rgba(22, 24, 27, 0.85);
            --icon-filter: brightness(0) invert(1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
            /* Solución: Bloquear selección globalmente (Imagen 4) */
            -webkit-user-select: none;
            user-select: none;
        }

        /* Permitir selección solo en editores */
        .rich-editor, input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.4s var(--fade-bezier), color 0.4s var(--fade-bezier);
        }

        /* Estilos base ajustados para modo oscuro (Imagen 1) */
        .task-text span {
            color: var(--text-main) !important;
        }

        /* Estilos del editor para evitar bugs en móviles */
        .rich-editor {
            width: 100%;
            height: 220px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            overflow-y: auto;
            text-align: left;
            touch-action: manipulation;
        }

        .phone-container { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--border-color); }

        /* ... [Resto de tu CSS original mantenido aquí] ... */
    </style>
</head>
<body>

    <div class="phone-container">
        </div>

    <script>

        // Solución: Notificaciones personalizadas (Imagen 2)
        function showCustomToast(message) {
            let toast = document.createElement('div');
            toast.innerText = message;
            toast.style.cssText = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:12px 20px; border-radius:10px; z-index:9999; font-size: 14px;";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleNotifications(val) {
            if(val) {
                if (!("Notification" in window)) {
                    showCustomToast("Tu navegador no soporta alertas.");
                    document.getElementById('notify-toggle').checked = false;
                    return;
                }
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        data.notify = true;
                        saveToLocalStorage();
                        showCustomToast("Alertas nativas activadas.");
                    } else {
                        data.notify = false;
                        saveToLocalStorage();
                        document.getElementById('notify-toggle').checked = false;
                        showCustomToast("Permiso denegado.");
                    }
                });
            } else {
                data.notify = false;
                saveToLocalStorage();
            }
        }
    </script>
</body>
</html>
