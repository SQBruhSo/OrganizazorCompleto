<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Perpetuo Responsivo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calendar-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px; /* Tamaño ideal para PC y adaptable a celular */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px;
        }

        /* Encabezado con selectores de mes y año */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 5px;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            color: #333;
        }

        select:focus {
            border-color: #007bff;
        }

        .nav-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #0056b3;
        }

        /* Cuadrícula del Calendario */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 5px;
        }

        .days div {
            padding: 12px 0;
            font-size: 14px;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .days div:hover:not(.empty) {
            background-color: #e9ecef;
        }

        /* Día actual destacado */
        .days .today {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        .days .today:hover {
            background-color: #0069d9;
        }

        .days .empty {
            cursor: default;
        }

        /* Ajustes específicos para pantallas muy chicas (Celulares) */
        @media (max-width: 380px) {
            select {
                padding: 6px 8px;
                font-size: 14px;
            }
            .nav-btn {
                padding: 6px 10px;
                font-size: 14px;
            }
            .days div {
                padding: 10px 0;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" id="prevBtn">&lt;</button>
            <div class="controls">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
            </div>
            <button class="nav-btn" id="nextBtn">&gt;</button>
        </div>

        <div class="weekdays">
            <div>Do</div>
            <div>Lu</div>
            <div>Ma</div>
            <div>Mi</div>
            <div>Ju</div>
            <div>Vi</div>
            <div>Sá</div>
        </div>

        <div class="days" id="daysContainer"></div>
    </div>

    <script>
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const daysContainer = document.getElementById('daysContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const months = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        // Obtener fecha actual del sistema
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();

        // Inicializar selectores
        function initSelectors() {
            // Llenar meses
            months.forEach((month, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = month;
                monthSelect.appendChild(option);
            });

            // Llenar años (Por ejemplo, desde 1900 hasta 2100)
            for (let i = 1900; i <= 2100; i++) {
                let option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                yearSelect.appendChild(option);
            }

            updateSelectValues();
        }

        function updateSelectValues() {
            monthSelect.value = currentMonth;
            yearSelect.value = currentYear;
        }

        // Renderizar los días del mes seleccionado
        function renderCalendar() {
            daysContainer.innerHTML = "";

            // Primer día del mes
            let firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            // Último día del mes
            let lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Espacios en blanco para los días antes del inicio del mes
            for (let i = 0; i < firstDayIndex; i++) {
                let emptyDiv = document.createElement('div');
                emptyDiv.classList.add('empty');
                daysContainer.appendChild(emptyDiv);
            }

            // Dibujar los días reales del mes
            let today = new Date();
            for (let day = 1; day <= lastDate; day++) {
                let dayDiv = document.createElement('div');
                dayDiv.textContent = day;

                // Resaltar si es exactamente el día de hoy
                if (day === today.getDate() && 
                    currentMonth === today.getMonth() && 
                    currentYear === today.getFullYear()) {
                    dayDiv.classList.add('today');
                }

                daysContainer.appendChild(dayDiv);
            }
        }

        // Eventos para los botones de atrás/adelante
        prevBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            updateSelectValues();
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            updateSelectValues();
            renderCalendar();
        });

        // Eventos para cuando el usuario cambia el selector directamente
        monthSelect.addEventListener('change', (e) => {
            currentMonth = parseInt(e.target.value);
            renderCalendar();
        });

        yearSelect.addEventListener('change', (e) => {
            currentYear = parseInt(e.target.value);
            renderCalendar();
        });

        // Arrancar la aplicación
        initSelectors();
        renderCalendar();
    </script>
</body>
</html>
